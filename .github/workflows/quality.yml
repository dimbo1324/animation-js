name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Format, lint, and rule sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prettier
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run lint:css

      - name: Assistant rules in sync
        run: npm run ai:check

  guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: index.html references exactly one CSS and one JS
        run: |
          css=$(grep -c '<link[^>]*rel="stylesheet"' public/index.html || true)
          js=$(grep -c '<script[^>]*src=' public/index.html || true)
          echo "stylesheets: $css, scripts: $js"
          if [ "$css" -ne 1 ] || [ "$js" -ne 1 ]; then
            echo "::error file=public/index.html::index.html must reference exactly one stylesheet and one script"
            exit 1
          fi

      - name: Shell and scenes stay independent
        run: |
          if grep -rn "from '\.\./\.\./shell" src/scenes; then
            echo "::error::src/scenes must not import from src/shell"
            exit 1
          fi
          if grep -rn "from '\.\./scenes" src/shell; then
            echo "::error::src/shell must not import from src/scenes"
            exit 1
          fi

      - name: Owner-private directory untouched
        run: |
          if ! git diff --quiet ${{ github.event.before || 'HEAD~1' }} HEAD -- docs/__arch__ 2>/dev/null; then
            echo "::warning::docs/__arch__ changed; it is owner-private"
          fi
