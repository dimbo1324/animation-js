name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Publish the live demo
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Stage the site
        run: |
          mkdir -p _site
          cp -r public src _site/
          # public/index.html references ../src, so it has to keep its
          # folder. A root redirect gives Pages the entry point it needs
          # without adding a second HTML file to the repository.
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=./public/index.html" />
              <title>Animation JS</title>
            </head>
            <body>
              <a href="./public/index.html">Animation JS</a>
            </body>
          </html>
          HTML

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
